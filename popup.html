<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* ── Theme variables ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 240px;
      padding: 16px;
      margin: 0;
      transition: background 0.2s, color 0.2s;
    }
    body.dark {
      background: #0d1b2a;
      color: #e8edf2;
      --c-title:       #e8edf2;
      --c-stat:        #ff6b6b;
      --c-muted:       #8a9bb0;
      --c-label:       #e8edf2;
      --c-hr:          #1e3048;
      --c-li-border:   #1e3048;
      --c-li-text:     #e8edf2;
      --c-rm-btn:      #3a5068;
      --c-rm-hover:    #ff6b6b;
      --c-input-bg:    #0d1b2a;
      --c-input-fg:    #e8edf2;
      --c-input-bdr:   #1e3048;
      --c-placeholder: #3a5068;
      --c-status:      #3a5068;
      --c-slider-off:  #2a3f55;
      --c-lifetime:    #3a5068;
    }
    body.light {
      background: #ffffff;
      color: #1a1a1a;
      --c-title:       #1a1a1a;
      --c-stat:        #c00;
      --c-muted:       #666;
      --c-label:       #333;
      --c-hr:          #e0e0e0;
      --c-li-border:   #f0f0f0;
      --c-li-text:     #333;
      --c-rm-btn:      #aaa;
      --c-rm-hover:    #c00;
      --c-input-bg:    #fff;
      --c-input-fg:    #333;
      --c-input-bdr:   #ccc;
      --c-placeholder: #aaa;
      --c-status:      #999;
      --c-slider-off:  #ccc;
      --c-lifetime:    #888;
    }

    /* ── Header row ── */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h2 {
      font-size: 14px;
      margin: 0;
      color: var(--c-title);
    }
    .night-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .night-label {
      font-size: 11px;
      color: var(--c-muted);
    }
    /* Smaller switch for night mode */
    .switch-sm {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .switch-sm input { opacity: 0; width: 0; height: 0; }
    .switch-sm .slider {
      position: absolute;
      inset: 0;
      background: var(--c-slider-off);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch-sm .slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.3);
    }
    .switch-sm input:checked + .slider { background: #0a66c2; }
    .switch-sm input:checked + .slider::before { transform: translateX(14px); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-label {
      font-size: 13px;
      color: var(--c-label);
      font-weight: 600;
    }

    /* iOS-style switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--c-slider-off);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    input:checked + .slider { background: #0a66c2; }
    input:checked + .slider::before { transform: translateX(20px); }
    input:disabled + .slider { opacity: 0.4; cursor: default; }

    hr {
      border: none;
      border-top: 1px solid var(--c-hr);
      margin: 0 0 12px;
    }
    h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--c-muted);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .kw-count {
      font-size: 11px;
      color: #fff;
      border-radius: 8px;
      padding: 1px 5px;
      min-width: 16px;
      text-align: center;
      display: inline-block;
      box-sizing: border-box;
    }
    .kw-count.session  { background: #0a66c2; }
    .kw-count.lifetime { background: var(--c-lifetime); }

    .filtered-intro {
      font-size: 12px;
      color: var(--c-muted);
      margin: 0 0 8px;
    }
    .filtered-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filtered-list .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 2px 6px 2px 8px;
      background: rgba(10,102,194,0.1);
      color: #0a66c2;
      border-radius: 10px;
      border: 1px solid rgba(10,102,194,0.2);
    }
    body.dark .filtered-list .pill {
      background: rgba(10,102,194,0.2);
      color: #6ea8e0;
    }
    .filtered-list .pill .kw-count { font-size: 10px; padding: 0 4px; }
    .filtered-list .legend-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    #status {
      font-size: 11px;
      color: var(--c-status);
      text-align: right;
      margin-top: 10px;
    }
  </style>
</head>
<body class="light">
  <div class="header-row">
    <h2>AI Leh</h2>
    <div class="night-row">
      <span class="night-label">Night mode</span>
      <label class="switch-sm">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Stop hiding content</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <p class="filtered-intro">Following words are being filtered out:</p>
  <div class="legend-row">
    <span id="legend-session"  class="kw-count session">session 0</span>
    <span id="legend-lifetime" class="kw-count lifetime">lifetime 0</span>
  </div>
  <div id="filtered-list" class="filtered-list"></div>

  <div id="status">Loading…</div>
  <script src="popup.js"></script>
</body>
</html>
